user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log notice;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    # WebSocket upgrade mapping (keep-alive for SSE, upgrade for WebSocket)
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      keep-alive;
    }

    server {
        listen 80;
        server_name _;

        location / {
            proxy_pass http://opencode-app:4096;
            proxy_http_version 1.1;

            # WebSocket support
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Tell OpenCode it is behind HTTPS
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;

            # Long timeouts for persistent connections
            proxy_read_timeout 3600;
            proxy_send_timeout 3600;
            proxy_buffering off;

            # Override upstream CSP: allow eval (required by app) and Cloudflare beacon
            proxy_hide_header Content-Security-Policy;
            add_header Content-Security-Policy "script-src 'self' 'unsafe-eval' 'wasm-unsafe-eval' https://static.cloudflareinsights.com; default-src 'self'; connect-src 'self' wss: ws:; img-src 'self' data:; style-src 'self' 'unsafe-inline'; font-src 'self' data:; media-src 'self' data:;" always;
        }
    }
}
