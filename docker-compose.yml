services:
  opencode-app:
    build: .
    image: opencode-web:node24
    container_name: opencode-web
    hostname: opencode-web
    volumes:
      - ./config/opencode:/home/agent/.config/opencode
      - ./data/opencode:/home/agent/.local/share/opencode
      - .:/app
    environment:
      - OPENCODE_SERVER_PASSWORD=${OPENCODE_SERVER_PASSWORD:-secret}
      - OPENCODE_SERVER_USERNAME=${OPENCODE_SERVER_USERNAME:-admin}
    restart: unless-stopped

  opencode-web:
    image: nginx:alpine
    container_name: opencode-proxy
    ports:
      - "4096:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - opencode-app
    restart: unless-stopped

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: cloudflare-tunnel
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}
    depends_on:
      - opencode-web
    restart: unless-stopped

networks:
  default:
    name: opencode-network
